version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autosend-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: autosend
      POSTGRES_USER: autosend
      POSTGRES_PASSWORD: autosend123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
